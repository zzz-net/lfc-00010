<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 实验室样本转运台账</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8a 50%, #0ea5e9 100%);">
    <div class="card" style="width: 100%; max-width: 420px; padding: 40px;">
      <div style="text-align: center; margin-bottom: 32px;">
        <div style="width: 64px; height: 64px; background: var(--primary); border-radius: 16px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px;">
          🧪
        </div>
        <h1 style="font-size: 24px; font-weight: 600; color: var(--gray-800); margin-bottom: 8px;">实验室样本转运台账</h1>
        <p style="color: var(--gray-500); font-size: 14px;">Sample Transfer Management System</p>
      </div>
      
      <div id="alert-container"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">
          登录
        </button>
      </form>
      
      <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--gray-200);">
        <p style="font-size: 12px; color: var(--gray-500); text-align: center; margin-bottom: 12px;">测试账号</p>
        <div style="display: flex; gap: 8px;">
          <button type="button" class="btn btn-sm" style="flex: 1;" onclick="fillCredentials('admin', 'admin123')">
            管理员
          </button>
          <button type="button" class="btn btn-sm" style="flex: 1;" onclick="fillCredentials('operator', 'op123456')">
            操作员
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
